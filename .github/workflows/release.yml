name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }}

      - name: Collect jars
        id: jars
        run: |
          main=$(ls build/libs/*[0-9].jar | grep -v sources | grep -v dev | head -1)
          sources=$(ls build/libs/*-sources.jar 2>/dev/null || true)
          echo "main=$main" >> "$GITHUB_OUTPUT"
          echo "sources=$sources" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Amnetic ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.jars.outputs.main }}
            ${{ steps.jars.outputs.sources }}
